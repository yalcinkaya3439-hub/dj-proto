name: Windows Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: Build Windows EXE (JUCE + Core)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # windows-latest already ships VS 2022; no extra setup action needed.
      # Using the VS 2022 generator directly is the most reliable approach.
      - name: Configure (Visual Studio 17 2022 x64)
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DDJCORE_BUILD_TESTS=ON `
            -DDJAPP_BUILD=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run Core Tests on Windows
        shell: pwsh
        working-directory: build
        run: ctest -C Release --output-on-failure --parallel 4

      - name: Locate EXE
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse build -Filter *.exe |
                   Where-Object { $_.Name -notlike "*tests*" } |
                   Select-Object -First 1
          if ($exe) {
            Write-Host "EXE found: $($exe.FullName)"
            echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No EXE found — listing build output:"
            Get-ChildItem -Recurse build | Select-Object FullName
            echo "exe_path=" >> $env:GITHUB_OUTPUT
          }

      - name: Upload Windows EXE artifact
        if: steps.find_exe.outputs.exe_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: DJProto-Windows-x64
          path: ${{ steps.find_exe.outputs.exe_path }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
          retention-days: 7
